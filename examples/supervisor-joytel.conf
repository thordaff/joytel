[program:joytel-queue-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /path/to/your/project/artisan queue:work database --sleep=3 --tries=3 --max-time=3600 --queue=joytel,default
directory=/path/to/your/project
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=2
redirect_stderr=true
stdout_logfile=/var/log/joytel-queue-worker.log
stdout_logfile_maxbytes=100MB
stdout_logfile_backups=5
stopwaitsecs=3600

[program:joytel-queue-worker-high]
process_name=%(program_name)s_%(process_num)02d
command=php /path/to/your/project/artisan queue:work database --sleep=1 --tries=5 --max-time=1800 --queue=joytel
directory=/path/to/your/project
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=1
redirect_stderr=true
stdout_logfile=/var/log/joytel-queue-worker-high.log
stdout_logfile_maxbytes=50MB
stdout_logfile_backups=3
stopwaitsecs=1800

[group:joytel-workers]
programs=joytel-queue-worker,joytel-queue-worker-high
priority=999

# Installation Instructions:
# 1. Copy this file to /etc/supervisor/conf.d/joytel-workers.conf
# 2. Update the paths to match your project location
# 3. Update the user if needed (www-data, laravel, etc.)
# 4. Create log directories:
#    sudo mkdir -p /var/log
#    sudo chown www-data:www-data /var/log/joytel-*.log
# 
# 5. Update supervisor configuration:
#    sudo supervisorctl reread
#    sudo supervisorctl update
#    sudo supervisorctl start joytel-workers:*
#
# 6. Check status:
#    sudo supervisorctl status
#
# 7. View logs:
#    tail -f /var/log/joytel-queue-worker.log
#
# Management Commands:
# - sudo supervisorctl restart joytel-workers:*
# - sudo supervisorctl stop joytel-workers:*
# - sudo supervisorctl start joytel-workers:*